{% extends "master.html" %}

{% block title %}
Login | PLAN IT
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-md-5 col-lg-4">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate slideIn">

                <div class="card-header bg-primary text-white text-center py-4">

                    <h3 class="fw-bold mb-0">

                        Welcome Back

                    </h3>

                    <p class="mb-0 text-white-50 small">

                        Please login to your account

                    </p>

                </div>


                <div class="card-body p-4 p-md-5">

                    <form method="post" novalidate>

                        {% csrf_token %}


                        <div class="form-floating mb-3">

                            {{ form.username }}

                            <label for="id_username">

                                <i class="fa-solid fa-user me-2 text-muted"></i>

                                Username

                            </label>

                        </div>


                        <div class="form-floating mb-4">

                            {{ form.password }}

                            <label for="id_password">

                                <i class="fa-solid fa-lock me-2 text-muted"></i>

                                Password

                            </label>

                        </div>


                        <div class="d-grid mb-3">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg rounded-pill shadow-sm py-3 fw-bold">

                                Login

                                <i class="fa-solid fa-arrow-right ms-2"></i>

                            </button>

                        </div>

                    </form>


                    <div class="text-center">

                        <a
                            href="{% url 'forgotpassword' %}"
                            class="text-decoration-none small text-muted">

                            Forgot your password?

                        </a>

                        <hr class="my-4 opacity-25">


                        <p class="mb-0 text-muted">

                            New to Plan It?

                            <a
                                href="{% url 'signup' %}"
                                class="fw-bold text-primary text-decoration-none">

                                Create Account

                            </a>

                        </p>

                    </div>

                </div>

            </div>


            <div class="text-center mt-4">

                <a
                    href="/admin/"
                    class="text-secondary small text-decoration-none opacity-50 hover-scale">

                    <i class="fa-solid fa-shield-halved me-1"></i>

                    Admin Access

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
