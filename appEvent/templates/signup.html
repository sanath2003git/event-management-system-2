{% extends "master.html" %}
{% block title %}
   Signup
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg rounded-3">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4 text-primary fw-bold">Create an Account</h2>

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label fw-semibold">Username</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label for="id_email" class="form-label fw-semibold">Email</label>
                            {{ form.email }}
                        </div>

                        <div class="mb-3">
                            <label for="id_password1" class="form-label fw-semibold">Password</label>
                            {{ form.password1 }}
                        </div>

                        <div class="mb-3">
                            <label for="id_password2" class="form-label fw-semibold">Confirm Password</label>
                            {{ form.password2 }}
                        </div>

                        <div class="mb-3">
                            <label for="id_role" class="form-label fw-semibold">Role</label>
                            {{ form.role }}
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill shadow-sm">
                                Register
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p>
                            Already have an account? 
                            <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">
                                Login here
                            </a>
                        </p>
                    </div>

                    <hr>

                    <div class="text-center mt-3">
                        <a href="/admin/" class="btn btn-outline-dark btn-sm rounded-pill">
                            Admin Login
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
