{% extends "master.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3>Edit Profile</h3>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text"
                       name="username"
                       value="{{ request.user.username }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ request.user.email }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Profile Picture</label>
                <input type="file"
                       name="profile_pic"
                       class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-primary">

                Save Changes

            </button>

        </form>

    </div>

</div>

{% endblock %}
